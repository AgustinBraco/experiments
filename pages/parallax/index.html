<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="./styles.css" />
		<link rel="stylesheet" href="../../styles.css" />
		<link rel="shortcut icon" href="../../public/favicon.ico" type="image/x-icon" />
		<title>Parallax | Agustin Braco</title>
	</head>

	<body>
		<a class="backWrapper" href="../../">
			<div class="backArrow"></div>
		</a>

		<div class="parallaxContainer">
			<div class="parallaxWrapper">
				<div class="parallaxLine"></div>

				<div class="paralaxCircles">
					<div class="parallaxCircle">
						<div class="parallaxImage firstImage"></div>
						<span class="parallaxText firstText">Luna nueva</span>
					</div>

					<div class="parallaxCircle">
						<div class="parallaxImage secondImage"></div>
						<span class="parallaxText secondText">Luna menguante</span>
					</div>

					<div class="parallaxCircle">
						<div class="parallaxImage thirdImage"></div>
						<span class="parallaxText thirdText">Cuarto menguante</span>
					</div>

					<div class="parallaxCircle">
						<div class="parallaxImage fourthImage"></div>
						<span class="parallaxText fourthText">Luna gibosa menguante</span>
					</div>

					<div class="parallaxCircle">
						<div class="parallaxImage fifthImage"></div>
						<span class="parallaxText fifthText">Luna llena</span>
					</div>

					<div class="parallaxCircle">
						<div class="parallaxImage sixthImage"></div>
						<span class="parallaxText sixthText">Luna gibosa creciente</span>
					</div>

					<div class="parallaxCircle">
						<div class="parallaxImage seventhImage"></div>
						<span class="parallaxText seventhText">Cuarto creciente</span>
					</div>

					<div class="parallaxCircle">
						<div class="parallaxImage eighthImage"></div>
						<span class="parallaxText eighthText">Luna creciente</span>
					</div>
				</div>
			</div>
		</div>
		<script src="./scripts.js"></script>
	</body>
</html>
