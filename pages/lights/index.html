<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="./styles.css" />
		<link rel="stylesheet" href="../../styles.css" />
		<link rel="shortcut icon" href="../../public/favicon.ico" type="image/x-icon" />
		<link
			rel="shortcut icon"
			href="https://raw.githubusercontent.com/AgustinBraco/studying-web-development/master/assets/favicon.ico"
			type="image/x-icon"
		/>
		<title>Luces | Agustin Braco</title>
	</head>
	<body>
		<a class="backWrapper" href="../../">
			<div class="backArrow"></div>
		</a>

		<div class="container">
			<label
				><input checked id="keyButton" type="checkbox" class="button" />
				<div class="key"></div
			></label>

			<div class="lightsWrapper">
				<label
					><input checked id="bathButton" type="checkbox" class="button" />

				></label>

				<label
					><input checked id="bedButton" type="checkbox" class="button" />
					<div class="light bedLight"></div
				></label>

				<label
					><input checked id="kitchenButton" type="checkbox" class="button" />
					<div class="light kitchenLight"></div
				></label>

				<label
					><input checked id="livingButton" type="checkbox" class="button" />
					<div class="light livingLight"></div
				></label>
			</div>
		</div>
		<script src="https://cdn.jsdelivr.net/npm/sweetalert2@10"></script>
		<script type="module" src="./scripts.js"></script>
	</body>
</html>
