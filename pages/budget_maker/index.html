<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="./styles.css" />
		<link rel="stylesheet" href="../../styles.css" />
		<link rel="shortcut icon" href="../../public/favicon.ico" type="image/x-icon" />
		<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
		<link
			rel="shortcut icon"
			href="https://raw.githubusercontent.com/AgustinBraco/studying-web-development/master/assets/favicon.ico"
			type="image/x-icon"
		/>
		<title>Presupuestos | Agustin Braco</title>
	</head>
	<body>
		<a class="backWrapper" href="../../">
			<div class="backArrow"></div>
		</a>

		<div class="switchesContainer">
			<!-- Switch Nice -->
			<div class="switchWrapper">
				<h2 class="switchText">Bueno</h2>
				<div class="switchButton nice">
					<div class="switchIcon">
						<i class="bx bxl-sketch"></i>
					</div>
				</div>
			</div>

			<!-- Switch Fast -->
			<div class="switchWrapper">
				<h2 class="switchText">Rápido</h2>
				<div class="switchButton fast">
					<div class="switchIcon">
						<i class="bx bxs-timer"></i>
					</div>
				</div>
			</div>

			<!-- Switch Cheap -->
			<div class="switchWrapper">
				<h2 class="switchText">Barato</h2>
				<div class="switchButton cheap">
					<div class="switchIcon">
						<i class="bx bxs-offer"></i>
					</div>
				</div>
			</div>
		</div>
		<script src="./scripts.js"></script>
	</body>
</html>
